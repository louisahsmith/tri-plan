<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tri Plan · Jul 12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #e8e8ed;
    --muted: #7c7c8a;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --run: #60b4f0;
    --run-dim: rgba(96,180,240,0.12);
    --swim: #60e4c0;
    --swim-dim: rgba(96,228,192,0.12);
    --ride: #f0a860;
    --ride-dim: rgba(240,168,96,0.12);
    --brick: #f06090;
    --brick-dim: rgba(240,96,144,0.12);
    --rest: #3a3a44;
    --rest-text: #5a5a6a;
    --race: #f0e060;
    --race-dim: rgba(240,224,96,0.15);
    --phase-base1: #1e2535;
    --phase-base2: #1a2820;
    --phase-build1: #2a1e18;
    --phase-build2: #221a2e;
    --phase-taper: #2a2818;
    --phase-race: #2a2610;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,17,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .race-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--race);
    background: var(--race-dim);
    border: 1px solid rgba(240,224,96,0.25);
    padding: 3px 9px; border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .countdown {
    margin-top: 6px;
    font-size: 22px; font-weight: 700;
    color: var(--text); letter-spacing: -0.02em;
  }
  .countdown span { color: var(--accent); }
  .today-label {
    font-size: 12px; color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 1px;
  }

  /* ── TABS ── */
  .tab-bar {
    display: flex; gap: 6px;
    padding: 12px 20px 0;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .tab.active {
    background: var(--accent);
    color: #0f0f11;
    border-color: var(--accent);
    font-weight: 700;
  }
  .tab.recovery-tab { border-color: #3a3a44; }
  .tab.today-tab {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── MAIN ── */
  main { padding: 0 16px; }

  /* ── TODAY HERO ── */
  .today-section { padding: 20px 0 8px; }
  .today-header {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 12px;
  }
  .today-day-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    color: var(--accent); text-transform: uppercase;
  }
  .today-date-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
  }

  /* ── WEEK VIEW ── */
  .week-section { padding: 20px 0 8px; }
  .week-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .week-meta {
    display: flex; align-items: center; gap: 8px;
  }
  .week-num {
    font-family: 'DM Mono', monospace;
    font-size: 22px; font-weight: 500;
    color: var(--text); letter-spacing: -0.02em;
  }
  .week-dates {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
  }
  .week-phase {
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px;
    letter-spacing: 0.03em;
  }
  .week-run-total {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
    margin-bottom: 12px;
  }
  .week-run-total span { color: var(--run); }

  .phase-Base-I   { background: var(--phase-base1); color: #7ab0f0; border: 1px solid rgba(96,148,240,0.2); }
  .phase-Base-II  { background: var(--phase-base2); color: #70d4a0; border: 1px solid rgba(80,204,140,0.2); }
  .phase-Build-I  { background: var(--phase-build1); color: #f0b070; border: 1px solid rgba(240,160,80,0.2); }
  .phase-Build-II { background: var(--phase-build2); color: #c090f0; border: 1px solid rgba(180,120,240,0.2); }
  .phase-Taper    { background: var(--phase-taper); color: #e0d870; border: 1px solid rgba(220,210,80,0.2); }
  .phase-Race-Week{ background: var(--phase-race); color: var(--race); border: 1px solid rgba(240,224,96,0.3); }
  .recovery-badge {
    font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 10px;
    background: #2a2a30; color: var(--muted);
    border: 1px solid var(--border);
    letter-spacing: 0.04em;
  }

  /* ── DAY CARDS ── */
  .day-grid {
    display: flex; flex-direction: column; gap: 6px;
  }
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
  }
  .day-card:active { transform: scale(0.99); opacity: 0.9; }
  .day-card.expanded { border-color: var(--surface2); }
  .day-card.today-card {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-dim), 0 4px 20px rgba(200,240,96,0.08);
  }

  .day-card-header {
    display: flex; align-items: center;
    padding: 12px 14px;
    gap: 12px;
  }

  .day-dot {
    width: 8px; height: 8px;
    border-radius: 50%; flex-shrink: 0;
  }
  .dot-run   { background: var(--run); }
  .dot-swim  { background: var(--swim); }
  .dot-ride  { background: var(--ride); }
  .dot-brick { background: var(--brick); }
  .dot-rest  { background: var(--rest); }
  .dot-race  { background: var(--race); }

  .day-label-col { flex-shrink: 0; width: 32px; }
  .day-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 500;
    color: var(--muted); letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .day-label.today-label-day { color: var(--accent); }

  .day-title {
    font-size: 13px; font-weight: 500;
    color: var(--text); line-height: 1.3;
    flex: 1;
  }
  .day-title.rest-title { color: var(--rest-text); font-weight: 300; font-style: italic; }
  .day-title.race-title { color: var(--race); }

  .day-chevron {
    font-size: 10px; color: var(--muted);
    transition: transform 0.2s ease; flex-shrink: 0;
  }
  .day-card.expanded .day-chevron { transform: rotate(180deg); }
  .day-card.no-expand .day-chevron { display: none; }

  /* type accent stripe */
  .day-card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 14px 0 0 14px;
  }
  .type-run::before    { background: var(--run); }
  .type-swim::before   { background: var(--swim); }
  .type-ride::before   { background: var(--ride); }
  .type-brick::before  { background: var(--brick); }
  .type-rest::before   { background: var(--border); }
  .type-race::before   { background: var(--race); }

  /* ── WORKOUT BODY ── */
  .day-body {
    display: none;
    padding: 0 14px 14px 14px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }
  .day-card.expanded .day-body { display: block; }

  .workout-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px; line-height: 1.65;
    color: #b8b8c8;
    white-space: pre-wrap;
    padding: 12px 0 10px;
  }
  .workout-text .section-header {
    color: var(--text); font-weight: 500;
    display: block; margin-top: 4px;
  }
  .workout-text .interval-line {
    color: #c8d8f0; display: block; padding-left: 4px;
  }

  .copy-btn {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(200,240,96,0.2);
    padding: 8px 14px; border-radius: 20px;
    cursor: pointer; width: 100%;
    justify-content: center;
    margin-top: 4px;
    transition: all 0.15s ease;
    letter-spacing: 0.04em;
    -webkit-appearance: none;
  }
  .copy-btn:active { background: rgba(200,240,96,0.22); }
  .copy-btn.copied {
    color: var(--swim); background: rgba(96,228,192,0.12);
    border-color: rgba(96,228,192,0.25);
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,15,17,0.95);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    padding: 6px 0;
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.06em;
    color: var(--muted); cursor: pointer;
    text-transform: uppercase;
    border: none; background: none;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 18px; line-height: 1; }

  /* ── OVERVIEW ── */
  .overview-section { padding: 20px 0 8px; }
  .overview-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 14px;
  }
  .overview-grid {
    display: flex; flex-direction: column; gap: 4px;
  }
  .overview-row {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    gap: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .overview-row:active { opacity: 0.8; }
  .overview-row.current-week {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .overview-row.recovery-week { opacity: 0.8; }
  .ov-wk {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--muted); width: 24px; flex-shrink: 0;
  }
  .ov-dates {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    flex: 1;
  }
  .ov-phase {
    font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 10px;
    flex-shrink: 0;
  }
  .ov-mi {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--run);
    flex-shrink: 0; width: 44px; text-align: right;
  }
  .ov-icons {
    font-size: 12px; flex-shrink: 0; width: 40px; text-align: right;
  }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">Tri Training</div>
    <div class="race-chip">🏁 Jul 12</div>
  </div>
  <div class="countdown" id="countdown">Loading...</div>
  <div class="today-label" id="todayLabel">Loading...</div>
</header>

<div class="tab-bar" id="tabBar"></div>

<main id="mainContent"></main>

  <button class="nav-btn" id="navWeek" onclick="showView('week')">

  </button>
  <button class="nav-btn" id="navAll" onclick="showView('all')">
    <span class="nav-icon">≡</span>ALL
  </button>
</nav>

// ── helpers ──────────────────────────────────────────────────────
function today() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function getWeekNum(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diff = Math.floor((d - PLAN_START) / (7 * 86400000));
  return diff + 1;
}

function getDayOfWeek(date) {
  // returns 0=Mon..6=Sun within the week
  return (date.getDay() + 6) % 7;
}

function todayWorkout() {
  const t = today();
  const wk = getWeekNum(t);
  if (wk < 1 || wk > 16) return null;
  const dow = getDayOfWeek(t);
  const data = WORKOUTS[String(wk)];
  if (!data) return null;
  return { wk, dow, day: data.days[dow], phase: data.phase, dates: data.dates };
}

function daysUntilRace() {
  const t = today();
  const diff = Math.ceil((RACE_DATE - t) / 86400000);
  return diff;
}

function phaseClass(phase) {
  return 'phase-' + phase.replace(/ /g,'-');
}

function typeColor(type) {
  const map = {run:'run',swim:'swim',ride:'ride',brick:'brick',rest:'rest',race:'race'};
  return map[type] || 'rest';
}

function formatWorkoutText(body) {
  if (!body) return '';
  const lines = body.split('\n');
  return lines.map(line => {
    if (line.startsWith('- ')) return `<span class="interval-line">${escHtml(line)}</span>`;
    if (line.trim() && !line.startsWith(' ')) return `<span class="section-header">${escHtml(line)}</span>`;
    return escHtml(line);
  }).join('\n');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── copy to clipboard ─────────────────────────────────────────────
function copyWorkout(title, body, btn) {
  const text = title + '\n\n' + body;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘  copy for intervals.icu';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = '✓ copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘  copy for intervals.icu'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── card builder ──────────────────────────────────────────────────
function buildDayCard(day, dayIndex, isToday, weekNum) {
  const dayAbbr = ['MON','TUE','WED','THU','FRI','SAT','SUN'][dayIndex];
  const hasBody = day.body && day.body.trim().length > 0;
  const id = `card-w${weekNum}-d${dayIndex}`;

  return `<div class="day-card type-${day.type}${isToday ? ' today-card' : ''}${!hasBody ? ' no-expand' : ''}"
    id="${id}"
    onclick="${hasBody ? `toggleCard('${id}')` : ''}">
    <div class="day-card-header">
      <div class="day-dot dot-${day.type}"></div>
      <div class="day-label-col">
        <div class="day-label${isToday ? ' today-label-day' : ''}">${dayAbbr}</div>
      </div>
      <div class="day-title${day.type==='rest'?' rest-title':''}${day.type==='race'?' race-title':''}">${escHtml(day.title)}</div>
      ${hasBody ? '<div class="day-chevron">▼</div>' : ''}
    </div>
    ${hasBody ? `<div class="day-body">
      <div class="workout-text">${formatWorkoutText(day.body)}</div>
      <button class="copy-btn" onclick="event.stopPropagation(); copyWorkout(${JSON.stringify(day.title)}, ${JSON.stringify(day.body)}, this)">⎘&nbsp; copy for intervals.icu</button>
    </div>` : ''}
  </div>`;
}

function toggleCard(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('expanded');
}

  currentView = view;
  ['today','week','all'].forEach(v => {
    document.getElementById('nav'+v.charAt(0).toUpperCase()+v.slice(1)).classList.toggle('active', v===view);
  });
  renderMain();
  // sync tab bar
  if (view === 'week' && currentWeekTab) {
    syncTabToWeek(currentWeekTab);
  }
}

function renderMain() {
  const main = document.getElementById('mainContent');
  if (currentView === 'today') main.innerHTML = renderToday();
  else if (currentView === 'week') main.innerHTML = renderWeek(currentWeekTab || getCurrentWeek());
  else main.innerHTML = renderAll();
}

function getCurrentWeek() {
  const wk = getWeekNum(today());
  return Math.max(1, Math.min(16, wk));
}

function renderToday() {
  const t = today();
  const info = todayWorkout();
  const days = daysUntilRace();

  if (!info) {
    // before or after plan
    if (t < PLAN_START) {
      return `<div class="today-section"><div class="empty-state">Plan starts<br>Mon Mar 23</div></div>`;
    }
    return `<div class="today-section"><div class="empty-state">Plan complete!<br>Hope the race went well 🏁</div></div>`;
  }

  const { wk, dow, day, phase, dates } = info;
  const hasBody = day.body && day.body.trim();
  const weekData = WORKOUTS[String(wk)];

  return `<div class="today-section">
    <div class="today-header">
      <div class="today-day-label">Today · Week ${wk}</div>
      <div class="today-date-label">${dates}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <span class="week-phase ${phaseClass(phase)}">${phase}</span>
      ${weekData.recovery ? '<span class="recovery-badge">recovery</span>' : ''}
    </div>
    <div class="day-grid">
      ${buildDayCard(day, dow, true, wk)}
    </div>
    <div style="margin-top:20px;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;">Rest of this week</div>
      <div class="day-grid">
        ${weekData.days.map((d,i) => i !== dow ? buildDayCard(d, i, false, wk) : '').join('')}
      </div>
    </div>
    <div style="margin-top:16px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Mono',monospace;">
      <div style="font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;">This week's running</div>
      <div style="font-size:18px;color:var(--run);font-weight:500;">${weekData.run_mi} <span style="font-size:12px;color:var(--muted)">miles</span></div>
    </div>
  </div>`;
}

function renderWeek(wk) {
  currentWeekTab = wk;
  const data = WORKOUTS[String(wk)];
  if (!data) return '';
  const t = today();
  const todayWk = getWeekNum(t);
  const todayDow = getDayOfWeek(t);

  return `<div class="week-section">
    <div class="week-header">
      <div class="week-meta">
        <div class="week-num">Week ${wk}</div>
        ${data.recovery ? '<span class="recovery-badge">recovery</span>' : ''}
      </div>
      <span class="week-phase ${phaseClass(data.phase)}">${data.phase}</span>
    </div>
    <div class="week-dates" style="margin-bottom:4px;">${data.dates}</div>
    <div class="week-run-total">Run total: <span>${data.run_mi} mi</span></div>
    <div class="day-grid">
      ${data.days.map((d,i) => buildDayCard(d, i, wk===todayWk && i===todayDow, wk)).join('')}
    </div>
  </div>`;
}

function renderAll() {
  const t = today();
  const currentWk = getWeekNum(t);

  return `<div class="overview-section">
    <div class="overview-title">16-Week Plan</div>
    <div class="overview-grid">
      ${Object.entries(WORKOUTS).map(([wk, data]) => {
        const w = parseInt(wk);
        const isCurrent = w === currentWk;
        const types = data.days.map(d => d.type).filter(t => t !== 'rest');
        const icons = [...new Set(types)].map(t => ({run:'🏃',swim:'🏊',ride:'🚴',brick:'⚡',race:'🏁'}[t]||'')).join('');
        return `<div class="overview-row ${isCurrent?'current-week':''} ${data.recovery?'recovery-week':''}"
          onclick="currentWeekTab=${w}; showView('week');">
          <div class="ov-wk">${w}</div>
          <div style="flex:1;">
            <div class="ov-dates">${data.dates}</div>
          </div>
          <span class="ov-phase ${phaseClass(data.phase)}">${data.phase}</span>
          <div class="ov-mi">${data.run_mi}mi</div>
          <div class="ov-icons">${icons}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── TAB BAR ───────────────────────────────────────────────────────
function buildTabBar() {
  const bar = document.getElementById('tabBar');
  const t = today();
  const currentWk = getWeekNum(t);
  const tabs = [];

  for (let w = 1; w <= 16; w++) {
    const data = WORKOUTS[String(w)];
    const isCurrent = w === currentWk;
    const isRec = data.recovery;
    tabs.push(`<div class="tab ${isCurrent?'today-tab':''} ${isRec?'recovery-tab':''}"
      id="tab-${w}"
      onclick="currentWeekTab=${w}; showView('week');">
      Wk ${w}
    </div>`);
  }
  bar.innerHTML = tabs.join('');
}

function syncTabToWeek(wk) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById(`tab-${wk}`);
  if (tab) {
    tab.classList.add('active');
    tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

// ── HEADER ────────────────────────────────────────────────────────
function updateHeader() {
  const days = daysUntilRace();
  const t = today();
  const cd = document.getElementById('countdown');
  const tl = document.getElementById('todayLabel');

  if (days <= 0) {
    cd.innerHTML = 'Race day! 🏁';
    tl.textContent = '';
  } else if (days === 1) {
    cd.innerHTML = '<span>1</span> day to race';
  } else {
    cd.innerHTML = `<span>${days}</span> days to race`;
  }

  const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][t.getDay()];
  tl.textContent = `${dayName}, ${MONTH_NAMES[t.getMonth()]} ${t.getDate()}`;
}

// ── INIT ──────────────────────────────────────────────────────────
updateHeader();
buildTabBar();
renderMain();
</script>
</body>
</html>
