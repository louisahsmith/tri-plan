<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tri Plan · Jul 12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --surface2: #f5f0e8;
    --border: #e8e0d0;
    --text: #1a1712;
    --muted: #8a8070;
    --accent: #c85a2a;
    --accent-dim: rgba(200,90,42,0.08);
    --spin: #2a6abc;
    --spin-dim: rgba(42,106,188,0.08);
    --ride: #1a7a4a;
    --ride-dim: rgba(26,122,74,0.08);
    --swim: #2a7a9a;
    --swim-dim: rgba(42,122,154,0.08);
    --run: #7a3a9a;
    --run-dim: rgba(122,58,154,0.08);
    --brick: #c85a2a;
    --brick-dim: rgba(200,90,42,0.10);
    --strength: #7a6a1a;
    --strength-dim: rgba(122,106,26,0.08);
    --rest-bg: #f0ece4;
    --rest-text: #b0a898;
    --race-bg: #fff8e8;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,247,242,0.94);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; color: var(--muted);
    text-transform: uppercase;
  }
  .race-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(200,90,42,0.2);
    padding: 3px 9px; border-radius: 20px;
  }
  .countdown {
    margin-top: 5px;
    font-size: 24px; font-weight: 500;
    color: var(--text); letter-spacing: -0.02em;
    font-style: italic;
  }
  .countdown span { color: var(--accent); font-style: normal; font-weight: 700; }
  .today-sublabel {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }

  /* ── TABS ── */
  .tab-bar {
    display: flex; gap: 5px; padding: 10px 16px 0;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 500;
    padding: 5px 10px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer; white-space: nowrap;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab.today-tab { border-color: var(--accent); color: var(--accent); }
  .tab.recovery-tab { opacity: 0.7; }

  /* ── MAIN ── */
  main { padding: 0 16px; }

  /* ── WEEK HEADER ── */
  .week-section { padding: 20px 0 8px; }
  .week-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
  .week-num-big { font-size: 28px; font-weight: 700; line-height: 1; }
  .week-dates-small { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
  .phase-tag {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    padding: 4px 10px; border-radius: 20px; letter-spacing: 0.04em;
  }
  .phase-Base    { background: #e8f0f8; color: #2a5a8c; border: 1px solid #c8daf0; }
  .phase-Build   { background: #e8f4ec; color: #1a6a3a; border: 1px solid #b8e0c8; }
  .phase-Race-Prep { background: #f8ece8; color: #8c3a1a; border: 1px solid #e8c0b0; }
  .phase-Taper   { background: #f8f4e0; color: #7a6010; border: 1px solid #e0d080; }
  .phase-Race-Week { background: #fff4cc; color: #7a5400; border: 1px solid #e8c840; }
  .recovery-badge {
    font-family: 'DM Mono', monospace; font-size: 9px;
    padding: 2px 7px; border-radius: 10px;
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ── DAY CARDS ── */
  .day-grid { display: flex; flex-direction: column; gap: 6px; }
  .day-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    cursor: pointer; transition: all 0.15s;
    position: relative;
  }
  .day-card:active { transform: scale(0.99); }
  .day-card.today-card { border-color: var(--accent); box-shadow: 0 2px 12px rgba(200,90,42,0.1); }
  .day-card.no-expand { cursor: default; }

  .day-card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 16px 0 0 16px;
  }
  .type-spin::before    { background: var(--spin); }
  .type-ride::before    { background: var(--ride); }
  .type-swim::before    { background: var(--swim); }
  .type-run::before     { background: var(--run); }
  .type-brick::before   { background: var(--brick); }
  .type-strength::before{ background: var(--strength); }
  .type-rest::before    { background: var(--border); }
  .type-race::before    { background: #e8a800; }

  .day-header {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 13px 11px 14px;
  }
  .day-abbr {
    font-family: 'DM Mono', monospace; font-size: 9px;
    font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); flex-shrink: 0; width: 26px;
  }
  .day-abbr.is-today { color: var(--accent); }
  .day-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-spin     { background: var(--spin); }
  .dot-ride     { background: var(--ride); }
  .dot-swim     { background: var(--swim); }
  .dot-run      { background: var(--run); }
  .dot-brick    { background: var(--brick); }
  .dot-strength { background: var(--strength); }
  .dot-rest     { background: var(--border); }
  .dot-race     { background: #e8a800; }

  .day-title-wrap { flex: 1; }
  .day-title {
    font-size: 13px; font-weight: 500; line-height: 1.25;
    color: var(--text);
  }
  .day-title.rest-title { color: var(--rest-text); font-weight: 300; font-style: italic; }
  .day-title.race-title { color: #7a5400; }
  .day-extra-badge {
    font-family: 'DM Mono', monospace; font-size: 9px;
    color: var(--strength); background: var(--strength-dim);
    border: 1px solid rgba(122,106,26,0.15);
    padding: 1px 6px; border-radius: 8px;
    margin-top: 3px; display: inline-block;
  }
  .day-chevron { font-size: 9px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
  .day-card.expanded .day-chevron { transform: rotate(180deg); }

  /* ── WORKOUT BODY ── */
  .day-body {
    display: none; padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .day-card.expanded .day-body { display: block; }

  .workout-text {
    font-family: 'DM Mono', monospace; font-size: 12px;
    line-height: 1.7; color: #5a5040;
    white-space: pre-wrap; padding: 12px 0 8px;
  }
  .strength-section {
    margin-top: 10px; padding: 10px 12px;
    background: var(--strength-dim);
    border: 1px solid rgba(122,106,26,0.12);
    border-radius: var(--radius-sm);
  }
  .strength-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    color: var(--strength); letter-spacing: 0.06em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .strength-text {
    font-family: 'DM Mono', monospace; font-size: 11px;
    line-height: 1.6; color: #6a5a20;
    white-space: pre-wrap;
  }

  /* ── TODAY VIEW ── */
  .today-section { padding: 20px 0 8px; }
  .today-hero-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 10px;
  }

  /* ── OVERVIEW ── */
  .overview-section { padding: 20px 0 8px; }
  .overview-title {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .ov-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 9px 12px;
    cursor: pointer; margin-bottom: 4px; transition: all 0.15s;
  }
  .ov-row:active { opacity: 0.8; }
  .ov-row.current { border-color: var(--accent); background: var(--accent-dim); }
  .ov-wk { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 22px; flex-shrink: 0; }
  .ov-dates { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); flex: 1; }
  .ov-phase { font-size: 10px; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
  .ov-icons { font-size: 11px; flex-shrink: 0; width: 56px; text-align: right; color: var(--muted); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(250,247,242,0.96);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px; padding: 5px 0;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--muted); cursor: pointer; border: none; background: none;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 17px; line-height: 1; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; font-style: italic; }
</style>
</head>

function today(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function daysToRace(){ return Math.ceil((RACE-today())/86400000); }
function weekNum(d){ return Math.floor((d-START)/604800000)+1; }
function dowIndex(d){ return (d.getDay()+6)%7; } // 0=Mon..6=Sun

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function phaseClass(p){ return 'phase-'+p.replace(/ /g,'-'); }

const TYPE_ICON = {spin:'🚴',ride:'🚵',swim:'🏊',run:'🏃',brick:'⚡',strength:'💪',rest:'—',race:'🏁'};
const DOT_CLASS = {spin:'dot-spin',ride:'dot-ride',swim:'dot-swim',run:'dot-run',brick:'dot-brick',strength:'dot-strength',rest:'dot-rest',race:'dot-race'};

function cardHtml(day, dayIdx, isToday, wk){
  const hasBody = day.body && day.body.trim();
  const hasExtra = day.extra && day.extra.body;
  const hasContent = hasBody || hasExtra;
  const id = `c${wk}_${dayIdx}`;
  const abbr = WKDABR[dayIdx];
  const restType = day.type === 'rest';
  const raceType = day.type === 'race';

  let extraBadge = hasExtra ? `<div class="day-extra-badge">+ strength</div>` : '';

  return `<div class="day-card type-${day.type}${isToday?' today-card':''}${!hasContent?' no-expand':''}"
    id="${id}" onclick="${hasContent?`tog('${id}')`:''}" >
    <div class="day-header">
      <div class="day-abbr${isToday?' is-today':''}">${abbr}</div>
      <div class="day-dot ${DOT_CLASS[day.type]||'dot-rest'}"></div>
      <div class="day-title-wrap">
        <div class="day-title${restType?' rest-title':''}${raceType?' race-title':''}">${esc(day.title)}</div>
        ${extraBadge}
      </div>
      ${hasContent?'<div class="day-chevron">▼</div>':''}
    </div>
    ${hasContent?`<div class="day-body">
      ${hasBody?`<div class="workout-text">${esc(day.body)}</div>`:''}
      ${hasExtra?`<div class="strength-section">
        <div class="strength-label">+ Strength after</div>
        <div class="strength-text">${esc(day.extra.body)}</div>
      </div>`:''}
    </div>`:''}
  </div>`;
}

function tog(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('expanded');
}

// ── views ─────────────────────────────────────────────────────────
let view='today', activeWk=null;

function go(v){ 
  view=v;
  ['today','week','all'].forEach(x=>{
    document.getElementById('nav'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active',x===v);
  });
  render();
  if(v==='week' && activeWk) scrollTab(activeWk);
}

function render(){
  const m=document.getElementById('main');
  if(view==='today')  m.innerHTML=renderToday();
  else if(view==='week') m.innerHTML=renderWeek(activeWk||curWk());
  else m.innerHTML=renderAll();
}

function curWk(){ return Math.max(1,Math.min(16,weekNum(today()))); }

function renderToday(){
  const t=today();
  const wk=weekNum(t);
  if(wk<1||wk>16) return `<div class="today-section"><div class="empty-state">${wk<1?'Plan starts Mar 23 🌱':'Plan complete! Hope race day was amazing 🏁'}</div></div>`;
  const data=PLAN[String(wk)];
  const dow=dowIndex(t);
  const day=data.days[dow];
  const dn=DNAMES[t.getDay()];
  const restOfWeek=data.days.map((d,i)=>i!==dow?cardHtml(d,i,false,wk):'').join('');

  return `<div class="today-section">
    <div class="today-hero-label">${dn}, ${MONTHS[t.getMonth()]} ${t.getDate()} · Week ${wk}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <span class="phase-tag ${phaseClass(data.phase)}">${data.phase}</span>
      ${data.recovery?'<span class="recovery-badge">recovery week</span>':''}
    </div>
    <div class="day-grid">${cardHtml(day,dow,true,wk)}</div>
    <div style="margin-top:20px;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;">Rest of this week</div>
      <div class="day-grid">${restOfWeek}</div>
    </div>
  </div>`;
}

function renderWeek(wk){
  activeWk=wk;
  const data=PLAN[String(wk)];
  if(!data) return '';
  const t=today();
  const tw=weekNum(t); const td=dowIndex(t);
  return `<div class="week-section">
    <div class="week-header">
      <div>
        <div class="week-num-big">Week ${wk}</div>
        <div class="week-dates-small">${data.dates}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <span class="phase-tag ${phaseClass(data.phase)}">${data.phase}</span>
        ${data.recovery?'<span class="recovery-badge">recovery</span>':''}
      </div>
    </div>
    <div class="day-grid">
      ${data.days.map((d,i)=>cardHtml(d,i,wk===tw&&i===td,wk)).join('')}
    </div>
  </div>`;
}

function renderAll(){
  const t=today(); const cw=weekNum(t);
  return `<div class="overview-section">
    <div class="overview-title">16-Week Overview</div>
    ${Object.entries(PLAN).map(([wk,data])=>{
      const w=parseInt(wk);
      const types=[...new Set(data.days.map(d=>d.type))].filter(t=>t!=='rest');
      const icons=types.map(t=>TYPE_ICON[t]||'').join('');
      return `<div class="ov-row${w===cw?' current':''}" onclick="activeWk=${w};go('week')">
        <div class="ov-wk">${w}</div>
        <div class="ov-dates">${data.dates}</div>
        <span class="ov-phase ${phaseClass(data.phase)}">${data.phase}</span>
        <div class="ov-icons">${icons}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── header ────────────────────────────────────────────────────────
function updateHeader(){
  const d=daysToRace();
  const t=today();
  document.getElementById('countdown').innerHTML =
    d<=0 ? 'Race day! 🏁' :
    d===1 ? '<span>1</span> day to go' :
    `<span>${d}</span> days to race`;
  document.getElementById('todaySub').textContent =
    `${DNAMES[t.getDay()]}, ${MONTHS[t.getMonth()]} ${t.getDate()}`;
}

// ── tab bar ───────────────────────────────────────────────────────
function buildTabs(){
  const cw=curWk();
  document.getElementById('tabBar').innerHTML=
    Object.keys(PLAN).map(wk=>{
      const w=parseInt(wk);
      const data=PLAN[wk];
      return `<div class="tab${w===cw?' today-tab':''}${data.recovery?' recovery-tab':''}" id="tab${w}" onclick="activeWk=${w};go('week')">${w}</div>`;
    }).join('');
}

function scrollTab(wk){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('tab'+wk);
  if(el){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
}

updateHeader(); buildTabs(); render();
</script>
